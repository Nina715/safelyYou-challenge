name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Check coverage threshold (70%)
        run: |
          # Exclude generated code and entry-point wiring from the coverage calculation
          grep -v -e "api.gen.go" -e "main.go" coverage.out > coverage.filtered.out

          COVERAGE=$(go tool cover -func=coverage.filtered.out \
            | grep "^total:" \
            | awk '{print $3}' \
            | tr -d '%')

          echo "Coverage (excluding generated): ${COVERAGE}%"

          # Fail if below 70%
          THRESHOLD=70
          if awk "BEGIN { exit !($COVERAGE < $THRESHOLD) }"; then
            echo "FAIL: coverage ${COVERAGE}% is below the required ${THRESHOLD}%"
            exit 1
          fi

          echo "PASS: coverage ${COVERAGE}% meets the required ${THRESHOLD}%"
